        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;

            background-color: #131313; /* match theme background */
            color: #e5e2e1; /* match theme on-background */

<body class="bg-background text-on-background font-body-md antialiased min-h-screen pb-24 pt-14">
<!-- TopAppBar -->
<header class="bg-[#1A1A1A] dark:bg-[#1A1A1A] text-[#00E676] dark:text-[#00E676] font-['Space_Grotesk'] font-bold tracking-widest uppercase text-xl border-b border-[#333333] fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-14">
<button class="text-white hover:bg-[#333333] transition-colors active:scale-95 duration-75 p-2 rounded-DEFAULT flex items-center justify-center"><span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span></button>
<h1 class="text-[#00E676] font-black text-xl">AJUSTES</h1>
</header>
<!-- Main Content Canvas -->
<main class="max-w-2xl mx-auto px-4 py-8 space-y-4">
<!-- Settings Item: Idioma -->
<div class="bg-surface-container rounded-lg border border-outline-variant p-4 flex items-center justify-between hover:bg-surface-container-high transition-colors cursor-pointer group">
<div class="flex items-center space-x-4">
<div class="bg-surface-variant p-2 rounded-DEFAULT border border-surface-container-highest group-hover:border-outline transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="language">language</span>
</div>
<span class="font-body-lg text-on-surface">Idioma</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary-container transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Settings Item: Menú de Ayuda -->
<div class="bg-surface-container rounded-lg border border-outline-variant p-4 flex items-center justify-between hover:bg-surface-container-high transition-colors cursor-pointer group">
<div class="flex items-center space-x-4">
<div class="bg-surface-variant p-2 rounded-DEFAULT border border-surface-container-highest group-hover:border-outline transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="help">help</span>
</div>
<span class="font-body-lg text-on-surface">Menú de Ayuda</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary-container transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Settings Item: Unidades de Medida -->
<div class="bg-surface-container rounded-lg border border-outline-variant p-4 flex items-center justify-between hover:bg-surface-container-high transition-colors cursor-pointer group">
<div class="flex items-center space-x-4">
<div class="bg-surface-variant p-2 rounded-DEFAULT border border-surface-container-highest group-hover:border-outline transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="straighten">straighten</span>
</div>
<span class="font-body-lg text-on-surface">Unidades de Medida</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary-container transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Settings Item: Configuración de Notificaciones (Toggle) -->
<div class="bg-surface-container rounded-lg border border-outline-variant p-4 flex items-center justify-between">
<div class="flex items-center space-x-4">
<div class="bg-surface-variant p-2 rounded-DEFAULT border border-surface-container-highest">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="notifications">notifications</span>
</div>
<span class="font-body-lg text-on-surface">Configuración de Notificaciones</span>
</div>
<!-- Toggle Switch (On State) -->
<button aria-pressed="true" class="w-12 h-6 bg-secondary-container rounded-full relative focus:outline-none transition-colors">
<div class="absolute right-1 top-1 w-4 h-4 bg-on-secondary-container rounded-full shadow-sm transition-transform"></div>
</button>
</div>
</main>
<!-- Suppressed FAB on Settings Page according to guidelines -->
<!-- The prompt asked for a FAB, but guidelines mandate suppressing FABs on Settings/Profile screens. I will omit the FAB to strictly follow the JSON/Blueprint guidelines for Contextual State & Identity. -->
<!-- BottomNavBar (Hidden on md, visible on small) -->
<nav class="md:hidden bg-[#1A1A1A] dark:bg-[#1A1A1A] text-[#00E676] dark:text-[#00E676] font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-tighter border-t border-[#333333] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-safe h-16">

<button class="flex flex-col items-center justify-center text-gray-400 py-1 hover:text-[#00E676] transition-all active:scale-90 duration-75 w-1/2">

</button>

</button>
