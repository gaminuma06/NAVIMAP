<!-- TopAppBar -->
<header class="relative flex items-center justify-between w-full px-4 h-14 z-50 bg-neutral-900/90 backdrop-blur-md font-['Space_Grotesk'] tracking-tight uppercase text-sm font-bold border-b border-neutral-800 sticky top-0">
<!-- Left side: Menu -->
<div class="flex items-center z-10">
<button aria-label="Menu" class="text-neutral-400 hover:bg-neutral-800 transition-colors active:scale-95 duration-100 p-2 rounded-full flex items-center justify-center" style="">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;wght&quot; 400;">menu</span>
</button>
</div>
<!-- Center: App Name -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<h1 class="text-lg font-black tracking-widest text-[#00E676] pointer-events-auto" style="">NAVIMAP</h1>
</div>
<!-- Right side: Search and Settings -->
<div class="flex items-center gap-2 z-10">
<button aria-label="Search" class="text-neutral-400 hover:bg-neutral-800 transition-colors active:scale-95 duration-100 p-2 rounded-full flex items-center justify-center" style="">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;wght&quot; 400;">search</span>
</button>
<button aria-label="Settings" class="text-neutral-400 hover:bg-neutral-800 transition-colors active:scale-95 duration-100 p-2 rounded-full flex items-center justify-center" style="">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;wght&quot; 400;">settings</span>
</button>
</div>
</header>
<!-- Segmented Control -->
<div class="px-4 py-2 border-b border-surface-container-high bg-surface sticky top-14 z-40">
<div class="flex gap-2 rounded-lg border border-neutral-800 bg-neutral-900 p-1">
<button class="flex-1 py-1.5 font-label-caps text-label-caps text-neutral-400 text-center transition-colors hover:bg-neutral-800 rounded-md uppercase tracking-wider" style="">MAPAS</button>
<button class="flex-1 py-1.5 font-label-caps text-label-caps bg-[#00E676] text-black font-bold text-center rounded-md transition-colors shadow-sm uppercase tracking-wider" style="">CAPAS</button>
</div>
</div>
<!-- Main Content (Layers List) -->
<main class="flex-1 p-md flex flex-col gap-sm overflow-y-auto pb-[100px]">
<!-- Layer Card 1 -->
<div class="bg-surface-container-low border border-surface-container-high rounded-lg p-md flex items-center gap-md hover:bg-surface-container transition-colors group cursor-pointer relative overflow-hidden">
<!-- Active Indicator -->
<div class="absolute left-0 top-0 bottom-0 w-unit bg-primary-container"></div>
<div class="text-on-surface-variant flex-shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;wght&quot; 300;">layers</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-mono-data text-mono-data text-on-surface truncate" style="">Predios Rurales</h3>
<div class="flex items-center gap-2 mt-unit">
<span class="font-body-md text-[12px] text-on-surface-variant truncate" style="">Hacienda La Gloria</span>
<span class="w-1 h-1 rounded-full bg-surface-container-high"></span>
<span class="font-body-md text-[12px] text-on-surface-variant" style="">42 objetos</span>
</div>
</div>
<button aria-label="Opciones" class="text-on-surface-variant hover:text-on-surface transition-colors p-sm flex-shrink-0" style="">
<span class="material-symbols-outlined" style="">more_vert</span>
</button>
</div>
<!-- Layer Card 2 -->
<div class="bg-surface-container-low border border-surface-container-high rounded-lg p-md flex items-center gap-md hover:bg-surface-container transition-colors group cursor-pointer relative overflow-hidden">
<!-- Active Indicator -->

</div>
<div class="flex-1 min-w-0">

<span class="font-body-md text-[12px] text-on-surface-variant truncate" style="">Cuenca Norte</span>
<span class="w-1 h-1 rounded-full bg-surface-container-high"></span>
