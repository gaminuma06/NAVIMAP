<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GeoPDF Viewer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error": "#ffb4ab",
                      "surface-container-highest": "#353534",
                      "on-secondary-fixed-variant": "#00429b",
                      "background": "#131313",
                      "outline-variant": "#3b4a3d",
                      "primary-fixed": "#62ff96",
                      "tertiary-container": "#ffb7a5",
                      "primary": "#00E676",
                      "secondary-fixed": "#d9e2ff",
                      "on-primary-fixed": "#00210b",
                      "on-primary-container": "#00612e",
                      "on-tertiary-fixed-variant": "#8a1d00",
                      "secondary-container": "#0068ed",
                      "tertiary": "#ffddd5",
                      "primary-fixed-dim": "#00e475",
                      "tertiary-fixed": "#ffdad2",
                      "error-container": "#93000a",
                      "on-tertiary-container": "#a12300",
                      "on-error": "#690005",
                      "on-secondary-fixed": "#001945",
                      "on-tertiary": "#621100",
                      "on-primary-fixed-variant": "#005226",
                      "on-secondary-container": "#f2f3ff",
                      "secondary-fixed-dim": "#b0c6ff",
                      "surface": "#131313",
                      "surface-container-lowest": "#0e0e0e",
                      "surface-container": "#201f1f",
                      "surface-container-low": "#1c1b1b",
                      "on-secondary": "#002d6e",
                      "outline": "#859585",
                      "surface-dim": "#131313",
                      "surface-container-high": "#2a2a2a",
                      "on-tertiary-fixed": "#3c0700",
                      "on-primary": "#003918",
                      "on-surface-variant": "#bacbb9",
                      "inverse-on-surface": "#313030",
                      "surface-variant": "#353534",
                      "surface-bright": "#393939",
                      "secondary": "#b0c6ff",
                      "on-surface": "#e5e2e1",
                      "inverse-surface": "#e5e2e1",
                      "inverse-primary": "#006d35",
                      "on-background": "#e5e2e1",
                      "surface-tint": "#00e475",
                      "primary-container": "#00e676",
                      "tertiary-fixed-dim": "#ffb4a2",
                      "on-error-container": "#ffdad6"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "1rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xs": "4px",
                      "safe-area": "20px",
                      "unit": "4px",
                      "sm": "8px",
                      "gutter": "12px",
                      "xl": "32px",
                      "md": "16px",
                      "lg": "24px"
              },
              "fontFamily": {
                      "label-caps": ["Inter"],
                      "headline-md": ["Space Grotesk"],
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "mono-data": ["Space Grotesk"],
                      "headline-lg": ["Space Grotesk"]
              },
              "fontSize": {
                      "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
                      "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "mono-data": ["14px", {"lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "500"}],
                      "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}]
              }
            },
          },
        }
    </script>
<style>
        .map-bg {
            background-color: #0e0e0e;
            background-image: 
                linear-gradient(rgba(0, 230, 118, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 230, 118, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background-color: #00E676;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .crosshair::before { width: 1.5px; height: 32px; }
        .crosshair::after { width: 32px; height: 1.5px; }
        .crosshair-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 1.5px solid #00E676;
            border-radius: 50%;
            background-color: transparent;
        }
        
        /* GeoPDF Vector Simulation Styles */
        .geopdf-layer {
            position: absolute;
            inset: 0;
            opacity: 0.8;
            pointer-events: none;
        }
        .survey-line {
            position: absolute;
            background-color: #00E676;
            opacity: 0.6;
        }
        .survey-polygon {
            position: absolute;
            border: 1px solid #00E676;
            background-color: rgba(0, 230, 118, 0.1);
        }
        .contour-line {
            position: absolute;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            border: 0.5px solid rgba(0, 230, 118, 0.3);
        }
    </style>
</head>
<body class="bg-background text-on-background w-full h-screen overflow-hidden flex flex-col font-body-md text-body-md select-none">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center h-16 px-4 bg-neutral-900/90 backdrop-blur-md text-[#00E676] border-b border-neutral-800">
<div class="flex items-center w-12">
<button class="w-11 h-11 flex items-center justify-center rounded-DEFAULT hover:bg-neutral-800 hover:text-[#00E676] active:scale-95 transition-transform text-neutral-400">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 200;">arrow_back</span>
</button>
</div>
<h1 class="flex-1 text-center font-headline-md uppercase tracking-widest text-xs font-bold text-[#00E676] truncate mx-2">1823_HLG_RP1_Ajuste 2026</h1>
<div class="flex items-center justify-end w-12">
<button class="w-11 h-11 flex items-center justify-center rounded-DEFAULT hover:bg-neutral-800 hover:text-[#00E676] active:scale-95 transition-transform text-neutral-400">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 200;">info</span>
</button>
</div>
</header>
<!-- Map Canvas -->
<main class="flex-1 relative w-full h-full map-bg" data-location="Topographical Area">
<!-- Simulated GeoPDF Content (Survey Plan) -->
<div class="geopdf-layer">
<!-- Main Plot Polygon -->
<div class="survey-polygon w-[280px] h-[340px] top-[20%] left-[15%]" style="transform: rotate(15deg);"></div>
<!-- Technical Lines/Drawings -->
<div class="survey-line w-[400px] h-[0.5px] top-[45%] left-[-10%]" style="transform: rotate(-5deg);"></div>
<div class="survey-line w-[300px] h-[0.5px] top-[30%] left-[40%]" style="transform: rotate(85deg);"></div>
<div class="survey-line w-[500px] h-[0.5px] top-[70%] left-[5%]" style="transform: rotate(-2deg);"></div>
<!-- Contour Lines Simulation -->
<div class="contour-line w-[120%] h-[80%] -top-20 -left-10"></div>
<div class="contour-line w-[100%] h-[70%] top-10 left-20"></div>
<div class="contour-line w-[80%] h-[60%] top-40 left-40"></div>
<!-- Text Markers (Technical Labels) -->
<div class="absolute top-[25%] left-[25%] text-[10px] text-primary/50 font-mono-data uppercase">Parcela_A_442</div>
<div class="absolute top-[68%] left-[55%] text-[10px] text-primary/50 font-mono-data uppercase">Elev: 142.5m</div>
<div class="absolute top-[18%] left-[65%] text-[10px] text-primary/50 font-mono-data uppercase">Boundary_West</div>
</div>
<!-- Crosshair (Mira de Precisión) -->
<div class="absolute inset-0 pointer-events-none z-30 flex items-center justify-center">
<div class="relative w-8 h-8 crosshair">
<div class="crosshair-circle"></div>
</div>
</div>
<!-- Floating Elements -->
<!-- Compass -->
<div class="absolute top-[80px] right-4 z-40">
<div class="w-11 h-11 bg-surface-container-highest/80 backdrop-blur-sm rounded-lg flex items-center justify-center border border-outline-variant shadow-lg">
<span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'FILL' 0, 'wght' 200;">explore</span>
</div>
</div>
<!-- Location FAB -->
<div class="absolute bottom-[96px] right-4 z-40">
<button class="w-12 h-12 bg-surface-container-highest/90 backdrop-blur-sm rounded-lg flex items-center justify-center border border-outline-variant shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1, 'wght' 200;">location_on</span>
</button>
</div>
</main>
<!-- Custom Bottom Bar (Coordinates & Tools) -->
<footer class="fixed bottom-0 w-full z-50 bg-neutral-900/95 border-t border-neutral-800 px-4 py-3 flex items-center justify-between">
<!-- Edit Icon on the Left -->
<div class="flex items-center w-1/4 justify-start">
<button class="w-11 h-11 flex items-center justify-center rounded-DEFAULT hover:bg-neutral-800 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-neutral-400" style="font-variation-settings: 'FILL' 0, 'wght' 200;">edit</span>
</button>
</div>
<!-- Centered Coordinates Pill -->
<div class="flex-1 flex justify-center">
<div class="bg-surface-container-lowest border border-outline-variant rounded-full px-6 py-2 flex items-center justify-center min-w-fit">
<span class="font-mono-data text-mono-data text-primary tracking-wider whitespace-nowrap">8°39'25.3", -73°50'15.2"</span>
</div>
</div>
<!-- Layers Icon on the Right -->
<div class="flex items-center w-1/4 justify-end">
<button class="w-11 h-11 flex items-center justify-center rounded-DEFAULT hover:bg-neutral-800 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 0, 'wght' 200;">layers</span>
</button>
</div>
</footer>
</body></html>
